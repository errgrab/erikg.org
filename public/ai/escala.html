<!doctype html>
<html lang="pt-PT">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Escala</title>
        <meta name="theme-color" content="#0e0e0e" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <meta name="apple-mobile-web-app-title" content="Escala" />
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap"
            rel="stylesheet"
        />
        <script>
            // Inline PWA manifest
            const manifest = {
                name: "Escala",
                short_name: "Escala",
                description: "Calendário de turnos",
                start_url: "/escala",
                display: "standalone",
                background_color: "#0e0e0e",
                theme_color: "#0e0e0e",
                icons: [
                    {
                        src: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%230e0e0e"/><text y=".9em" font-size="80" x="10">#</text></svg>',
                        sizes: "any",
                        type: "image/svg+xml",
                    },
                ],
            };
            const blob = new Blob([JSON.stringify(manifest)], {
                type: "application/json",
            });
            const manifestURL = URL.createObjectURL(blob);
            const link = document.createElement("link");
            link.rel = "manifest";
            link.href = manifestURL;
            document.head.appendChild(link);

            // Inline service worker for offline support
            const swCode = `
const CACHE = 'escala-v1';
const ASSETS = [self.location.href.replace('/sw-inline','')];
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
});
`;
            if ("serviceWorker" in navigator) {
                const swBlob = new Blob([swCode], {
                    type: "application/javascript",
                });
                const swURL = URL.createObjectURL(swBlob);
                navigator.serviceWorker
                    .register(swURL, { scope: "/" })
                    .catch(() => {});
            }
        </script>
        <style>
            :root {
                --bg: #0e0e0e;
                --fg: #e8e0d0;
                --dim: #52504a;
                --mid: #8a8378;
                --acc: #c8922a;
                --surface: #141414;
                --border: #1c1c1c;
                --border-soft: #222220;
            }

            * {
                box-sizing: border-box;
            }
            body {
                font-family: "DM Mono", monospace;
                font-weight: 300;
                background: var(--bg);
                color: var(--fg);
                padding: 1.5rem 1rem;
                overflow: hidden;
            }

            .wrap {
                max-width: 420px;
                margin: 0 auto;
            }

            /* Header */
            .header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 1.5rem;
            }
            .header-title h1 {
                font-size: 0.7rem;
                font-weight: 400;
                letter-spacing: 0.15em;
                text-transform: uppercase;
                color: var(--acc);
            }
            .header-title p {
                font-size: 0.65rem;
                color: var(--dim);
                margin-top: 0.15rem;
            }
            .nav {
                display: flex;
                align-items: center;
                gap: 0.5rem;
            }
            .nav-btn {
                background: none;
                border: 1px solid var(--border);
                color: var(--dim);
                font-family: inherit;
                font-size: 1rem;
                width: 1.75rem;
                height: 1.75rem;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                transition: all 0.15s;
                line-height: 1;
            }
            .nav-btn:hover {
                border-color: var(--acc);
                color: var(--acc);
            }
            #month-label {
                font-size: 0.65rem;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                color: var(--fg);
                min-width: 10rem;
                text-align: center;
            }

            /* Legend */
            #legend {
                display: flex;
                flex-wrap: wrap;
                gap: 0.4rem;
                margin-bottom: 1rem;
            }
            .leg-btn {
                display: flex;
                align-items: center;
                gap: 0.5rem;
                padding: 0.25rem 0.6rem;
                font-size: 0.65rem;
                font-family: inherit;
                border: 1px solid var(--border);
                background: none;
                color: var(--fg);
                cursor: pointer;
                transition: all 0.15s;
            }
            .leg-btn:hover {
                border-color: var(--dim);
            }
            .leg-dot {
                width: 0.5rem;
                height: 0.5rem;
                flex-shrink: 0;
            }
            .leg-dim {
                color: var(--dim);
            }
            .add-btn {
                padding: 0.25rem 0.6rem;
                font-size: 0.65rem;
                font-family: inherit;
                border: 1px dashed var(--dim);
                background: none;
                color: var(--dim);
                cursor: pointer;
                transition: all 0.15s;
            }
            .add-btn:hover {
                border-color: var(--acc);
                color: var(--acc);
            }

            /* Calendar */
            .cal-wrap {
                border: 1px solid var(--border);
                overflow: hidden;
            }
            .weekdays {
                display: grid;
                grid-template-columns: repeat(7, 1fr);
                border-bottom: 1px solid var(--border);
            }
            .wd {
                text-align: center;
                padding: 0.5rem 0;
                font-size: 0.55rem;
                letter-spacing: 0.1em;
                color: var(--dim);
            }
            #cal {
                display: grid;
                grid-template-columns: repeat(7, 1fr);
            }
            .day {
                aspect-ratio: 1;
                border-right: 1px solid var(--border-soft);
                border-bottom: 1px solid var(--border-soft);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                position: relative;
                transition: background 0.1s;
            }
            .day:nth-child(7n) {
                border-right: none;
            }
            .day:hover {
                background: var(--surface);
            }
            .day.empty {
                background: var(--bg);
                cursor: default;
                pointer-events: none;
            }
            .day.today .day-num {
                color: var(--acc);
            }
            .day-num {
                font-size: 0.7rem;
                font-weight: 300;
                color: var(--mid);
                line-height: 1;
            }
            .day.has-type .day-num {
                color: rgba(232, 224, 208, 0.8);
            }
            .day.folga .day-num {
                color: #6a8fb0;
            }
            .day-label {
                font-size: 0.55rem;
                line-height: 1.2;
                text-align: center;
                margin-top: 0.2rem;
                pointer-events: none;
                color: rgba(232, 224, 208, 0.65);
            }
            .day-folga-mark {
                font-size: 0.6rem;
                color: #6a8fb0;
                margin-top: 0.2rem;
            }

            /* Stats */
            #stats {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 0.5rem;
                margin-top: 0.75rem;
            }
            .stat {
                border: 1px solid var(--border);
                padding: 0.6rem 0;
                text-align: center;
                background: var(--surface);
            }
            .stat-num {
                font-size: 1rem;
                font-weight: 300;
                color: var(--fg);
            }
            .stat-lbl {
                font-size: 0.55rem;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                color: var(--dim);
                margin-top: 0.15rem;
            }

            /* Modal overlay */
            .modal {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.6);
                backdrop-filter: blur(4px);
                z-index: 50;
                align-items: flex-end;
                justify-content: center;
                padding: 0;
            }
            @media (min-width: 480px) {
                .modal {
                    align-items: center;
                    padding: 1rem;
                }
            }
            .modal.open {
                display: flex;
            }
            .modal-inner {
                background: var(--surface);
                border: 1px solid var(--border);
                width: 100%;
                border-top-left-radius: 0;
                border-top-right-radius: 0;
                overflow: hidden;
            }
            @media (min-width: 480px) {
                .modal-inner {
                    max-width: 360px;
                    border-radius: 0;
                }
            }
            .modal-head {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0.75rem 1rem;
                border-bottom: 1px solid var(--border);
            }
            .modal-head span {
                font-size: 0.75rem;
                color: var(--fg);
            }
            .modal-close {
                background: none;
                border: none;
                color: var(--dim);
                font-size: 1.1rem;
                cursor: pointer;
                font-family: inherit;
                line-height: 1;
                padding: 0;
                transition: color 0.15s;
            }
            .modal-close:hover {
                color: var(--fg);
            }

            /* Day picker */
            #day-picker {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 0.5rem;
                padding: 0.75rem;
            }
            .pick-opt {
                border: 1px solid var(--border);
                padding: 0.6rem 0.4rem;
                text-align: center;
                cursor: pointer;
                font-family: inherit;
                background: none;
                color: var(--fg);
                transition: all 0.15s;
                font-size: 0.65rem;
            }
            .pick-opt:hover {
                border-color: var(--dim);
            }
            .pick-opt.selected {
                border-color: var(--acc);
            }
            .pick-folga {
                grid-column: span 2;
                border: 1px solid #2a3a4a;
                background: #0e1822;
                color: #6a8fb0;
                font-size: 0.75rem;
                font-family: inherit;
                padding: 0.6rem;
                cursor: pointer;
                transition: all 0.15s;
                text-align: center;
            }
            .pick-folga:hover,
            .pick-folga.selected {
                border-color: #6a8fb0;
            }
            .pick-clear {
                grid-column: span 2;
                border: 1px dashed var(--border);
                background: none;
                color: var(--dim);
                font-size: 0.65rem;
                font-family: inherit;
                padding: 0.5rem;
                cursor: pointer;
                text-align: center;
                transition: all 0.15s;
            }
            .pick-clear:hover {
                border-color: var(--dim);
                color: var(--mid);
            }
            .pick-empty {
                grid-column: span 2;
                text-align: center;
                color: var(--dim);
                font-size: 0.7rem;
                padding: 1rem 0;
            }

            /* Type modal */
            .type-form {
                padding: 1rem;
                display: flex;
                flex-direction: column;
                gap: 0.75rem;
            }
            .form-row {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 0.75rem;
            }
            label {
                font-size: 0.6rem;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                color: var(--dim);
                display: block;
                margin-bottom: 0.3rem;
            }
            .field {
                width: 100%;
                background: var(--bg);
                border: 1px solid var(--border);
                color: var(--fg);
                font-family: inherit;
                font-size: 0.75rem;
                padding: 0.4rem 0.6rem;
                outline: none;
                transition: border-color 0.15s;
            }
            .field:focus {
                border-color: var(--dim);
            }
            input[type="time"].field::-webkit-calendar-picker-indicator {
                filter: invert(0.4);
            }
            #swatches {
                display: flex;
                flex-wrap: wrap;
                gap: 0.3rem;
                margin-top: 0.1rem;
            }
            .swatch {
                width: 1.1rem;
                height: 1.1rem;
                border: 2px solid transparent;
                cursor: pointer;
                transition: transform 0.1s;
                flex-shrink: 0;
            }
            .swatch:hover {
                transform: scale(1.15);
            }
            .swatch.sel {
                border-color: var(--fg);
            }
            .form-actions {
                display: flex;
                gap: 0.5rem;
            }
            .btn {
                flex: 1;
                padding: 0.5rem;
                font-size: 0.7rem;
                font-family: inherit;
                border: 1px solid;
                cursor: pointer;
                transition: all 0.15s;
                text-align: center;
            }
            .btn-primary {
                background: var(--acc);
                border-color: var(--acc);
                color: var(--bg);
                font-weight: 400;
            }
            .btn-primary:hover {
                opacity: 0.85;
            }
            .btn-danger {
                background: none;
                border-color: var(--border);
                color: #a05040;
            }
            .btn-danger:hover {
                border-color: #a05040;
            }
            .btn-danger.confirm {
                background: #a05040;
                border-color: #a05040;
                color: var(--fg);
            }
            .btn-danger.hidden {
                display: none;
            }
        </style>
    </head>
    <body>
        <div class="wrap">
            <div class="header">
                <div class="header-title">
                    <h1>Escala</h1>
                    <p>calendário de turnos</p>
                </div>
                <div class="nav">
                    <button class="nav-btn" onclick="changeMonth(-1)">
                        &lsaquo;
                    </button>
                    <span id="month-label"></span>
                    <button class="nav-btn" onclick="changeMonth(1)">
                        &rsaquo;
                    </button>
                </div>
            </div>

            <div id="legend"></div>

            <div class="cal-wrap">
                <div class="weekdays">
                    <div class="wd">DOM</div>
                    <div class="wd">SEG</div>
                    <div class="wd">TER</div>
                    <div class="wd">QUA</div>
                    <div class="wd">QUI</div>
                    <div class="wd">SEX</div>
                    <div class="wd">SÁB</div>
                </div>
                <div id="cal"></div>
            </div>

            <div id="stats"></div>
        </div>

        <!-- Day modal -->
        <div
            class="modal"
            id="day-modal"
            onclick="if (event.target === this) closeModal('day-modal');"
        >
            <div class="modal-inner">
                <div class="modal-head">
                    <span id="day-title"></span>
                    <button
                        class="modal-close"
                        onclick="closeModal('day-modal')"
                    >
                        ×
                    </button>
                </div>
                <div id="day-picker"></div>
            </div>
        </div>

        <!-- Type modal -->
        <div
            class="modal"
            id="type-modal"
            onclick="if (event.target === this) closeModal('type-modal');"
        >
            <div class="modal-inner">
                <div class="modal-head">
                    <span id="type-title"></span>
                    <button
                        class="modal-close"
                        onclick="closeModal('type-modal')"
                    >
                        ×
                    </button>
                </div>
                <div class="type-form">
                    <div class="form-row">
                        <div>
                            <label>Código</label>
                            <input
                                id="t-code"
                                class="field"
                                maxlength="6"
                                placeholder="ex: L194"
                            />
                        </div>
                        <div>
                            <label>Cor</label>
                            <div id="swatches"></div>
                        </div>
                    </div>
                    <div class="form-row">
                        <div>
                            <label>Entrada</label>
                            <input type="time" id="t-in" class="field" />
                        </div>
                        <div>
                            <label>Saída</label>
                            <input type="time" id="t-out" class="field" />
                        </div>
                    </div>
                    <div class="form-actions">
                        <button
                            id="t-del"
                            class="btn btn-danger hidden"
                            onclick="deleteType()"
                        >
                            Apagar
                        </button>
                        <button class="btn btn-primary" onclick="saveType()">
                            Guardar
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <script>
            const PALETTE = [
                "#c8783a",
                "#c8922a",
                "#a0b840",
                "#40a87a",
                "#3a90c8",
                "#7060c8",
                "#c85060",
                "#b06030",
                "#60a060",
                "#5080c0",
                "#9050a0",
                "#c06880",
            ];
            const MONTHS = [
                "Janeiro",
                "Fevereiro",
                "Março",
                "Abril",
                "Maio",
                "Junho",
                "Julho",
                "Agosto",
                "Setembro",
                "Outubro",
                "Novembro",
                "Dezembro",
            ];
            const WD = [
                "Domingo",
                "Segunda",
                "Terça",
                "Quarta",
                "Quinta",
                "Sexta",
                "Sábado",
            ];

            const KEY = "escala_v5";
            function load() {
                try {
                    const s = localStorage.getItem(KEY);
                    if (s) return JSON.parse(s);
                } catch (e) {}
                return { types: [], days: {} };
            }
            function save() {
                localStorage.setItem(KEY, JSON.stringify(state));
            }

            let state = load();
            const now = new Date();
            let cur = new Date(now.getFullYear(), now.getMonth(), 1);
            let editDay = null,
                editTypeIdx = null,
                selectedColor = PALETTE[0];

            function dk(d) {
                return `${cur.getFullYear()}-${String(cur.getMonth() + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
            }
            function getType(code) {
                return state.types.find((t) => t.code === code);
            }

            function closeModal(id) {
                document.getElementById(id).classList.remove("open");
            }
            function openModal(id) {
                document.getElementById(id).classList.add("open");
            }

            function render() {
                document.getElementById("month-label").textContent =
                    `${MONTHS[cur.getMonth()].toUpperCase()} ${cur.getFullYear()}`;

                // Legend
                const leg = document.getElementById("legend");
                leg.innerHTML = "";
                state.types.forEach((t, i) => {
                    const el = document.createElement("button");
                    el.className = "leg-btn";
                    el.innerHTML = `<span class="leg-dot" style="background:${t.color}"></span><span>${t.code}</span><span class="leg-dim">${t.in}-${t.out}</span>`;
                    el.onclick = () => openEditType(i);
                    leg.appendChild(el);
                });
                const add = document.createElement("button");
                add.className = "add-btn";
                add.textContent = "+ horário";
                add.onclick = openNewType;
                leg.appendChild(add);

                // Calendar
                const cal = document.getElementById("cal");
                cal.innerHTML = "";
                const y = cur.getFullYear(),
                    m = cur.getMonth();
                const firstDay = new Date(y, m, 1).getDay();
                const dim = new Date(y, m + 1, 0).getDate();
                const today = new Date();
                const isThisMonth =
                    today.getFullYear() === y && today.getMonth() === m;

                for (let i = 0; i < firstDay; i++) {
                    const e = document.createElement("div");
                    e.className = "day empty";
                    cal.appendChild(e);
                }

                for (let d = 1; d <= dim; d++) {
                    const val = state.days[dk(d)];
                    const type = val && val !== "F" ? getType(val) : null;
                    const isFolga = val === "F";
                    const isToday = isThisMonth && today.getDate() === d;

                    const cell = document.createElement("div");
                    let cls = "day";
                    if (type) cls += " has-type";
                    else if (isFolga) cls += " folga";
                    if (isToday) cls += " today";
                    cell.className = cls;

                    if (type) {
                        cell.style.background = type.color + "22";
                    }

                    const num = document.createElement("div");
                    num.className = "day-num";
                    num.textContent = d;
                    cell.appendChild(num);

                    if (type) {
                        const lbl = document.createElement("div");
                        lbl.className = "day-label";
                        lbl.style.color = type.color + "cc";
                        lbl.innerHTML = `${type.in}<br><span style="opacity:0.4;font-size:0.5rem">-</span><br>${type.out}`;
                        cell.appendChild(lbl);
                    } else if (isFolga) {
                        const lbl = document.createElement("div");
                        lbl.className = "day-folga-mark";
                        lbl.textContent = "F";
                        cell.appendChild(lbl);
                    }

                    cell.onclick = () => openDayPicker(d);
                    cal.appendChild(cell);
                }

                // Stats
                let worked = 0,
                    folgas = 0,
                    free = 0;
                for (let d = 1; d <= dim; d++) {
                    const v = state.days[dk(d)];
                    if (!v) free++;
                    else if (v === "F") folgas++;
                    else worked++;
                }
                document.getElementById("stats").innerHTML = [
                    [worked, "Turnos"],
                    [folgas, "Folgas"],
                    [free, "Livres"],
                    [dim, "Dias"],
                ]
                    .map(
                        ([v, l]) =>
                            `<div class="stat"><div class="stat-num">${v}</div><div class="stat-lbl">${l}</div></div>`,
                    )
                    .join("");
            }

            function openDayPicker(d) {
                editDay = d;
                const val = state.days[dk(d)];
                const wd = new Date(
                    cur.getFullYear(),
                    cur.getMonth(),
                    d,
                ).getDay();
                const MS = [
                    "Jan",
                    "Fev",
                    "Mar",
                    "Abr",
                    "Mai",
                    "Jun",
                    "Jul",
                    "Ago",
                    "Set",
                    "Out",
                    "Nov",
                    "Dez",
                ];
                document.getElementById("day-title").textContent =
                    `${WD[wd]}, ${d} ${MS[cur.getMonth()]}`;

                const picker = document.getElementById("day-picker");
                picker.innerHTML = "";

                if (state.types.length === 0) {
                    const empty = document.createElement("p");
                    empty.className = "pick-empty";
                    empty.textContent = "Nenhum horário criado.";
                    picker.appendChild(empty);
                } else {
                    state.types.forEach((t) => {
                        const opt = document.createElement("button");
                        opt.className =
                            "pick-opt" + (val === t.code ? " selected" : "");
                        opt.style.borderColor = val === t.code ? t.color : "";
                        opt.style.background = t.color + "15";
                        opt.style.color = t.color + "dd";
                        opt.innerHTML = `<div style="font-size:0.6rem;margin-bottom:0.25rem;opacity:0.7">${t.code}</div><div>${t.in}</div><div style="font-size:0.5rem;opacity:0.3">-</div><div>${t.out}</div>`;
                        opt.onclick = () => {
                            state.days[dk(editDay)] = t.code;
                            save();
                            closeModal("day-modal");
                            render();
                        };
                        picker.appendChild(opt);
                    });
                }

                const fo = document.createElement("button");
                fo.className = "pick-folga" + (val === "F" ? " selected" : "");
                fo.innerHTML = `F - Folga`;
                fo.onclick = () => {
                    state.days[dk(editDay)] = "F";
                    save();
                    closeModal("day-modal");
                    render();
                };
                picker.appendChild(fo);

                const cl = document.createElement("button");
                cl.className = "pick-clear";
                cl.textContent = "- limpar dia -";
                cl.onclick = () => {
                    delete state.days[dk(editDay)];
                    save();
                    closeModal("day-modal");
                    render();
                };
                picker.appendChild(cl);

                openModal("day-modal");
            }

            function openEditType(i) {
                editTypeIdx = i;
                const t = state.types[i];
                document.getElementById("type-title").textContent =
                    `editar - ${t.code}`;
                document.getElementById("t-code").value = t.code;
                document.getElementById("t-in").value = t.in;
                document.getElementById("t-out").value = t.out;
                const delBtn = document.getElementById("t-del");
                delBtn.classList.remove("hidden", "confirm");
                delBtn.textContent = "Apagar";
                selectedColor = t.color;
                renderSwatches();
                openModal("type-modal");
            }

            function openNewType() {
                editTypeIdx = null;
                document.getElementById("type-title").textContent =
                    "novo horário";
                document.getElementById("t-code").value = "";
                document.getElementById("t-in").value = "09:00";
                document.getElementById("t-out").value = "17:00";
                document.getElementById("t-del").classList.add("hidden");
                selectedColor = PALETTE[state.types.length % PALETTE.length];
                renderSwatches();
                openModal("type-modal");
            }

            function renderSwatches() {
                const el = document.getElementById("swatches");
                el.innerHTML = "";
                PALETTE.forEach((c) => {
                    const sw = document.createElement("button");
                    sw.className =
                        "swatch" + (c === selectedColor ? " sel" : "");
                    sw.style.background = c;
                    sw.onclick = () => {
                        selectedColor = c;
                        renderSwatches();
                    };
                    el.appendChild(sw);
                });
            }

            function saveType() {
                const code = document
                    .getElementById("t-code")
                    .value.trim()
                    .toUpperCase();
                const inT = document.getElementById("t-in").value;
                const outT = document.getElementById("t-out").value;
                if (!code || !inT || !outT) return;
                if (editTypeIdx !== null) {
                    const old = state.types[editTypeIdx].code;
                    state.types[editTypeIdx] = {
                        code,
                        color: selectedColor,
                        in: inT,
                        out: outT,
                    };
                    if (old !== code)
                        Object.keys(state.days).forEach((k) => {
                            if (state.days[k] === old) state.days[k] = code;
                        });
                } else {
                    state.types.push({
                        code,
                        color: selectedColor,
                        in: inT,
                        out: outT,
                    });
                }
                save();
                closeModal("type-modal");
                render();
            }

            function deleteType() {
                if (editTypeIdx === null) return;
                const code = state.types[editTypeIdx].code;
                const btn = document.getElementById("t-del");
                if (!btn.classList.contains("confirm")) {
                    btn.classList.add("confirm");
                    btn.textContent = "confirmar?";
                    setTimeout(() => {
                        btn.classList.remove("confirm");
                        btn.textContent = "Apagar";
                    }, 3000);
                    return;
                }
                state.types.splice(editTypeIdx, 1);
                Object.keys(state.days).forEach((k) => {
                    if (state.days[k] === code) delete state.days[k];
                });
                save();
                closeModal("type-modal");
                render();
            }

            function changeMonth(dir) {
                cur = new Date(cur.getFullYear(), cur.getMonth() + dir, 1);
                render();
            }

            render();
        </script>
    </body>
</html>
