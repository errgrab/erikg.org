<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Timer - Erik G</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'DM Mono', monospace;
  font-weight: 300;
  background: #0e0e0e;
  color: #e8e0d0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}

.container {
  max-width: 600px;
  width: 100%;
  text-align: center;
}

.mode {
  font-size: 0.875rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #52504a;
  margin-bottom: 2rem;
}

.mode.active {
  color: #c8922a;
}

.timer {
  font-size: 6rem;
  line-height: 1;
  margin-bottom: 3rem;
  color: #e8e0d0;
  letter-spacing: 0.05em;
}

.controls {
  display: flex;
  gap: 2rem;
  justify-content: center;
  margin-bottom: 3rem;
}

.btn {
  background: none;
  border: none;
  color: #52504a;
  font-family: 'DM Mono', monospace;
  font-weight: 300;
  font-size: 0.875rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  padding: 0.5rem 1rem;
  transition: color 0.2s;
}

.btn:hover {
  color: #e8e0d0;
}

.btn:active {
  color: #c8922a;
}

.btn.active {
  color: #c8922a;
}

.stats {
  color: #52504a;
  font-size: 0.75rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 4rem;
}

.stats-row {
  margin-bottom: 0.5rem;
}

.stats-value {
  color: #e8e0d0;
}

@media (max-width: 640px) {
  .timer {
    font-size: 4rem;
  }
  
  .controls {
    gap: 1rem;
  }
  
  .btn {
    font-size: 0.75rem;
    padding: 0.5rem;
  }
}
</style>
</head>
<body>
<div class="container">
  <div class="mode" id="mode">FOCUS</div>
  <div class="timer" id="timer">25:00</div>
  <div class="controls">
    <button class="btn" id="startBtn">Start</button>
    <button class="btn" id="resetBtn">Reset</button>
  </div>
  <div class="stats">
    <div class="stats-row">
      <span>Session:</span> <span class="stats-value" id="sessionCount">1</span>
    </div>
    <div class="stats-row">
      <span>Completed:</span> <span class="stats-value" id="completedCount">0</span>
    </div>
    <div class="stats-row">
      <span>Total Time:</span> <span class="stats-value" id="totalTime">0h 0m</span>
    </div>
  </div>
</div>

<script>
const FOCUS_TIME = 25 * 60;
const SHORT_BREAK = 5 * 60;
const LONG_BREAK = 15 * 60;

const modes = {
  FOCUS: { label: 'FOCUS', duration: FOCUS_TIME },
  SHORT_BREAK: { label: 'SHORT BREAK', duration: SHORT_BREAK },
  LONG_BREAK: { label: 'LONG BREAK', duration: LONG_BREAK }
};

let currentMode = 'FOCUS';
let timeRemaining = FOCUS_TIME;
let isRunning = false;
let intervalId = null;
let sessionNumber = 1;
let completedSessions = 0;
let totalMinutes = 0;

const timerDisplay = document.getElementById('timer');
const modeDisplay = document.getElementById('mode');
const startBtn = document.getElementById('startBtn');
const resetBtn = document.getElementById('resetBtn');
const sessionCountDisplay = document.getElementById('sessionCount');
const completedCountDisplay = document.getElementById('completedCount');
const totalTimeDisplay = document.getElementById('totalTime');

function loadStats() {
  const saved = localStorage.getItem('pomodoroStats');
  if (saved) {
    const stats = JSON.parse(saved);
    completedSessions = stats.completedSessions || 0;
    totalMinutes = stats.totalMinutes || 0;
    updateStatsDisplay();
  }
}

function saveStats() {
  localStorage.setItem('pomodoroStats', JSON.stringify({
    completedSessions,
    totalMinutes
  }));
}

function updateStatsDisplay() {
  sessionCountDisplay.textContent = sessionNumber;
  completedCountDisplay.textContent = completedSessions;
  const hours = Math.floor(totalMinutes / 60);
  const mins = totalMinutes % 60;
  totalTimeDisplay.textContent = `${hours}h ${mins}m`;
}

function formatTime(seconds) {
  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;
  return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
}

function updateDisplay() {
  timerDisplay.textContent = formatTime(timeRemaining);
  modeDisplay.textContent = modes[currentMode].label;
}

function playBeep() {
  const audioContext = new (window.AudioContext || window.webkitAudioContext)();
  const oscillator = audioContext.createOscillator();
  const gainNode = audioContext.createGain();
  
  oscillator.connect(gainNode);
  gainNode.connect(audioContext.destination);
  
  oscillator.frequency.value = 800;
  oscillator.type = 'sine';
  
  gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
  gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
  
  oscillator.start(audioContext.currentTime);
  oscillator.stop(audioContext.currentTime + 0.5);
}

function switchMode(newMode) {
  currentMode = newMode;
  timeRemaining = modes[currentMode].duration;
  updateDisplay();
}

function completeSession() {
  playBeep();
  
  if (currentMode === 'FOCUS') {
    completedSessions++;
    totalMinutes += 25;
    saveStats();
    updateStatsDisplay();
    
    if (sessionNumber % 4 === 0) {
      switchMode('LONG_BREAK');
    } else {
      switchMode('SHORT_BREAK');
    }
  } else {
    if (currentMode === 'SHORT_BREAK' || currentMode === 'LONG_BREAK') {
      sessionNumber++;
      updateStatsDisplay();
    }
    switchMode('FOCUS');
  }
}

function tick() {
  if (timeRemaining > 0) {
    timeRemaining--;
    updateDisplay();
  } else {
    stop();
    completeSession();
  }
}

function start() {
  if (!isRunning) {
    isRunning = true;
    startBtn.textContent = 'Pause';
    startBtn.classList.add('active');
    intervalId = setInterval(tick, 1000);
  } else {
    pause();
  }
}

function pause() {
  isRunning = false;
  startBtn.textContent = 'Start';
  startBtn.classList.remove('active');
  if (intervalId) {
    clearInterval(intervalId);
    intervalId = null;
  }
}

function stop() {
  pause();
}

function reset() {
  stop();
  switchMode('FOCUS');
  sessionNumber = 1;
  updateStatsDisplay();
}

startBtn.addEventListener('click', start);
resetBtn.addEventListener('click', reset);

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    start();
  } else if (e.code === 'KeyR') {
    e.preventDefault();
    reset();
  }
});

loadStats();
updateDisplay();
updateStatsDisplay();
</script>
</body>
</html>
